name: Deploy to Alibaba Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          HOST: ${{ secrets.HOST }}
          PORT: ${{ secrets.PORT }}
          USERNAME: ${{ secrets.USERNAME }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H -p $PORT $HOST >> ~/.ssh/known_hosts 2>/dev/null

          echo "==> Syncing files..."
          ssh -o StrictHostKeyChecking=no -p $PORT $USERNAME@$HOST "mkdir -p $DEPLOY_PATH/dist"
          scp -o StrictHostKeyChecking=no -P $PORT -r dist/* $USERNAME@$HOST:$DEPLOY_PATH/dist/

          echo "==> Configuring Nginx..."
          printf '%s\n' 'server {' '    listen 80;' '    server_name _;' '    root /var/www/quit-smoking-app/dist;' '    index index.html;' '    location / {' '        try_files $uri $uri/ /index.html;' '    }' '    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {' '        expires 30d;' '        add_header Cache-Control "public, immutable";' '    }' '    gzip on;' '    gzip_types text/css application/javascript application/json image/svg+xml;' '    gzip_min_length 1000;' '}' | ssh -o StrictHostKeyChecking=no -p $PORT $USERNAME@$HOST "sudo tee /etc/nginx/sites-available/quit-smoking-app > /dev/null"
          ssh -o StrictHostKeyChecking=no -p $PORT $USERNAME@$HOST "sudo ln -sf /etc/nginx/sites-available/quit-smoking-app /etc/nginx/sites-enabled/ && sudo rm -f /etc/nginx/sites-enabled/default && sudo nginx -t && sudo systemctl reload nginx"

          echo "==> Done! Visit http://$HOST"
